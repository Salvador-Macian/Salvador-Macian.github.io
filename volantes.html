<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volantes para SimRacing</title>
    <style>
        body {
            background-image: url(imagenes/fondonegro.webp); 
            background-size: cover;
            background-repeat: no-repeat;
            background-color: #000;
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
        }

        h1, h2 {
            color: #ff5555; 
            text-align: center;
        }

        .migas {
            position: absolute;   
            top: 25px;                       
            left: 15px;                       
            font-size: 18px; 
            z-index: 100;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 6px;
        }

        .migas a {
            text-decoration: none;
            color: #ffffff;
            font-weight: bold;
        }

        .migas a:hover {
            text-decoration: underline;
        }

        .migas span {
            color: #ffffff;
        }

        .migas .actual {
            color: white;
            border-bottom: 2px solid #ff5555;
        }

        .bases {
            display: flex;
            flex-direction: column;
            gap: 50px;
            padding: 20px;
            margin-top: 60px;
            align-items: center;
        }

        .filaspesadas {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
            width: 100%;
            padding-bottom: 20px;
        }

        .bases img {
            width: 250px;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body>

    <nav class="migas" aria-label="Navegación secundaria">  
        <a href="salvaweb.html">Inicio</a>
        <span aria-hidden="true" style="margin: 0 5px;"> › </span>
        <a href="productossim.html">Componentes</a>
        <span aria-hidden="true" style="margin: 0 5px;"> › </span> 
        <span class="actual" aria-current="page">Volantes</span>    
    </nav>

    <header role="banner">
        <h1>Volantes para SimRacing</h1>
    </header>

    <main role="main">
        <section class="bases" aria-label="Catálogo de volantes">
            
            <section class="filaspesadas" aria-labelledby="moza-title">
                <h2 id="moza-title">Volantes de Moza</h2>
                <img src="imagenes/mozavolante.webp" alt="Volante Moza KS">
                <img src="imagenes/kspro.webp" alt="Volante Moza FSR">
                <img src="imagenes/rsv2.webp" alt="Volante Moza RS V2">
            </section>

            <section class="filaspesadas" aria-labelledby="fana-title">
                <h2 id="fana-title">Volantes de Fanatec</h2>
                <img src="imagenes/bmwfana.webp" alt="Volante Fanatec BMW M4">
                <img src="imagenes/FANATECGT3.webp" alt="Volante Fanatec McLaren GT3">
                <img src="imagenes/formula.jpg" alt="Volante Fanatec Formula V2.5">
            </section>

            <section class="filaspesadas" aria-labelledby="simlab-title">
                <h2 id="simlab-title">Volantes Sim-Lab</h2>
                <img src="imagenes/retro.webp" alt="Volante Sim-Lab Retro">
                <img src="imagenes/doce.jpg" alt="Volante Sim-Lab GT3">
                <img src="imagenes/prosche.webp" alt="Volante Sim-Lab Porsche Cup">
            </section>

        </section>
    </main>

</body>
</html>
