<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volantes para SimRacing</title>
    <style>
        .bases {
            display: flex;
            flex-direction: column;
            gap: 30px;         
            padding: 20px;
        }
        .bases .filaspesadas {
            display: flex;
            gap: 20px;            
            justify-content: center;
            flex-wrap: wrap;       
        }
        .bases img {
            width: 250px;           
            height: auto;
            border-radius: 8px;    
            box-shadow: 8px rgb(6, 101, 6); 
        }
        body {
            background-color: black;
            background-size: cover;
            background-repeat: no-repeat;
        }
        h1 {
            color: white;
            text-align: center;
        }
        h2 {
            color: white;
        }
        span {
            color: white;
        }
        .migas {
            position: absolute; 
            top: 70px;         
            left: 15px;         
            font-size: 14px;
            z-index: 100;       
        }
        .migas a {
            text-decoration: none;
            color: #ffffff;
        }
        .migas a:hover {
            text-decoration: underline;
        }
        .migas span {
            color: #ffffff;
        }
        .migas .actual {
            color: white;
        }
        h1 {
            color: red;
        }
        h2 {
            color: red;
        }
    </style>
</head>
<body>
    <nav class="migas" aria-label="navegación">
        <a href="index.html">Inicio</a>
        <span aria-hidden="true">›</span>
        <a href="productossim.html">Componentes</a>
        <span aria-hidden="true">›</span> 
        <span class="actual" aria-current="page">Volantes</span>
    </nav>

    <header role="banner">
        <h1>Volantes para SimRacing</h1>
    </header>

    <main role="main">
        <section class="bases">
            <article class="filaspesadas">
                <h2>Volantes de Moza</h2>
                <img src="imagenes/mozavolante.webp" alt="Volante Moza KS">
                <img src="imagenes/kspro.webp" alt="Volante Moza GS V2P GT">
                <img src="imagenes/rsv2.webp" alt="Volante Moza RS V2">
            </article>

            <article class="filaspesadas">
                <h2>Volantes de Fanatec</h2>
                <img src="imagenes/f1lila.webp" alt="Volante Fanatec ClubSport Steering Wheel F1">
                <img src="imagenes/mclaren.webp" alt="Volante Fanatec CSL Elite Steering Wheel McLaren GT3 V2">
                <img src="imagenes/bmwv2.webp" alt="Volante Fanatec ClubSport Steering Wheel BMW GT2 V2">
            </article>
        </section>
    </main>
</body>
</html>
