<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedales para SimRacing</title>
    <style>
        @media (max-width: 480px) {
            h1 { font-size: 22px; }
            h2 { font-size: 18px; }
            .bases
             { padding: 10px; gap: 20px; }
            .filaspesadas
             { flex-direction: column; align-items: center; }
            .bases img
             { width: 90%; max-width: 300px; }
            .migas
             { font-size: 12px; top: 10px; left: 10px; }
        }
        @media (min-width: 481px) and (max-width: 1024px) {
            h1 { font-size: 30px; }
            h2 { font-size: 24px; }
            .bases { padding: 20px; }
        }
        .bases
         { display: flex; flex-direction: column; gap: 30px; padding: 20px; }
        .bases .filaspesadas
         { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .bases img 
        { width: 250px; height: auto; border-radius: 8px; border: 1px solid; }
        body
         { background-color: black; background-size: cover; background-repeat: no-repeat; }
        h1
         { color: white; text-align: center; }
        h2 
        { color: white; }
        span
         { color: white; }
        .migas
         { position: absolute; top: 70px; left: 15px; font-size: 14px; z-index: 100; }
        .migas a 
        { text-decoration: none; color: white; }
        .migas a:hover 
        { text-decoration: underline; }
        .migas span
         { color: #ffffff; }
        .migas .actual
         { color: white; }
        h1 { color: red; }
        h2 { color: red; }
    </style>
</head>
<body>
    <nav class="migas" aria-label="Ruta de navegación">
        <a href="index.html">Inicio</a>
        <span aria-hidden="true">›</span>
        <a href="productossim.html">Componentes</a>
        <span aria-hidden="true">›</span> 
        <span class="actual" aria-current="page">Pedales</span>
    </nav>

    <header role="banner">
        <h1>Pedales para SimRacing</h1>
    </header>

    <main role="main">
        <section class="bases">
            <article class="filaspesadas">
                <h2>Gama Media</h2>
                <img src="imagenes/r3pedales.webp" alt="Pedales Moza SR-P Lite">
                <img src="imagenes/cslpedales.webp" alt="Pedales Fanatec CSL Pedals">
                <img src="imagenes/t300pedales.webp" alt="Pedales Thrustmaster T3PM">
            </article>

            <article class="filaspesadas">
                <h2>Gama Alta</h2>
                <img src="imagenes/crpppedales.webp" alt="Pedales Moza CRP">
                <img src="imagenes/v3pedales.webp" alt="Pedales Fanatec ClubSport V3">
                <img src="imagenes/p1000.webp" alt="Pedales Simagic P1000">
            </article>

            <article class="filaspesadas">
                <h2>Gama Profesional</h2>
                <img src="imagenes/mpedales.webp" alt="Pedales Heusinkveld Ultimate+">
                <img src="imagenes/activepedal.webp" alt="Pedales Simucube ActivePedal">
                <img src="imagenes/aseteppedales.webp" alt="Pedales Asetek Invicta">
            </article>
        </section>
    </main>
</body>
</html>
