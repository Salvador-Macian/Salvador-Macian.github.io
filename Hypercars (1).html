<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HyperCars</title>
    <link rel="stylesheet" href="hyupercars.css">
</head>
<body>
    <header role="banner">
        <h1>HyperCars</h1>
    </header>

    <main role="main">
        <section>
            <div class="coches">
                <article class="coche" role="article">
                    <div class="carta">
                        <div class="frente">
                            <img src="imagenes/800000000000.jpg" alt="Ferrari 499P en pista">
                            <h3>Ferrari 499P</h3>
                        </div>
                        <div class="detras">
                            <h3>Ferrari 499P</h3>
                            <p>1.000 CV - 1.030 kg</p>
                            <label for="audio de coche">Sonido en Cabina:</label>
                            <audio src="Audios/ferrari499c.mp3"></audio>
                        </div>
                    </div>
                </article>

                <article class="coche" role="article">
                    <div class="carta">
                        <div class="frente">
                            <img src="imagenes/cadillac.jpg" alt="Cadillac V-Series.R">
                            <h3>Cadillac V-Series.R</h3>
                        </div>
                        <div class="detras">
                            <h3>Cadillac V-Series.R</h3>
                            <label for="audio de coche">Sonido en Cabina:</label>
                            <audio id="aud-cad" controls src="Audios/cadillac sonido.mp3"></audio>
                        </div>
                    </div>
                </article>

                <article class="coche" role="article">
                    <div class="carta">
                        <div class="frente">
                            <img src="imagenes/toyotahyper.webp" alt="Toyota GR010 Hybrid">
                            <h3>Toyota GR010 Hybrid</h3>
                        </div>
                        <div class="detras">
                            <h3>Toyota GR010 Hybrid</h3>
                            <label for="audio de coche">Sonido en Cabina:</label>
                            <audio  src="Audios/toyota sonido.mp3"></audio>
                        </div>
                    </div>
                </article>
            </div>
        </section>
    </main>
</body>
</html>
