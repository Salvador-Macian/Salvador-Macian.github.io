<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tipos de Base</title>
    <style>
        .bases {
            display: flex;
            flex-direction: column;
            gap: 30px;         
            padding: 20px;
        }
        .bases .filaspesadas {
            display: flex;
            gap: 20px;            
            justify-content: center;
            flex-wrap: wrap;       
        }
        .bases img {
            width: 250px;           
            height: auto;
            border-radius: 8px;    
            box-shadow: 8px rgb(6, 101, 6); 
        }
        body {
            background-color: black;
            background-size: cover;
            background-repeat: no-repeat;
        }
        h1 {
            color: white;
            text-align: center;
        }
        h2 {
            color: white;
        }
        span {
            color: white;
        }
        .migas {
            position: absolute; 
            top: 70px;         
            left: 15px;         
            font-size: 14px;
            z-index: 100;       
        }
        .migas a {
            text-decoration: none;
            color: #ffffff;
        }
        .migas a:hover {
            text-decoration: underline;
        }
        .migas span {
            color: #ffffff;
        }
        .migas .actual {
            color: white;
        }
        h1 {
            color: red;
        }
        h2 {
            color: red;
        }
    </style>
</head>
<body>
    <nav class="migas" aria-label="navegación">
        <a href="index.html">Inicio</a>
        <span aria-hidden="true">›</span>
        <a href="productossim.html">Componentes</a>
        <span aria-hidden="true">›</span> 
        <span class="actual" aria-current="page">Tipos de Base</span>
    </nav>

    <header role="banner">
        <h1>Tipos de Base</h1>
    </header>

    <main role="main">
        <section class="bases">
            <article class="filaspesadas">
                <h2>Bases de 3-6 Newton</h2>
                <img src="imagenes/r3.webp" alt="Base Moza R3">
                <img src="imagenes/t5555.jpg" alt="Base Thrustmaster T128">
                <img src="imagenes/fanteclogo.webp" alt="Base Fanatec CSL DD">
            </article>

            <article class="filaspesadas">
                <h2>Bases de 8-12 Newton</h2>
                <img src="imagenes/r9.webp" alt="Base Moza R9">
                <img src="imagenes/r12.webp" alt="Base Moza R12">
                <img src="imagenes/vrs.jpg" alt="Base VRS DirectForce Pro">
            </article>

            <article class="filaspesadas">
                <h2>Bases de 15-25 Newton</h2>
                <img src="imagenes/r21.webp" alt="Base Moza R21">
                <img src="imagenes/simucube.webp" alt="Base Simucube 2 Pro">
                <img src="imagenes/launica.jpg" alt="Base Fanatec Podium DD2">
            </article>
        </section>
    </main>
</body>
</html>
